services:
  stuart:
    build: .
    # Localhost-only — use a reverse proxy for external access.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - stuart-data:/data/.claw-stu
    environment:
      - CLAW_STU_DATA_DIR=/data/.claw-stu
      # Auth mode: enforce | generate | dev
      # - STU_AUTH_MODE=generate
      # Pass provider keys via env
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - OPENAI_API_KEY=sk-...
      # - GOOGLE_API_KEY=AIza...
      # - OLLAMA_BASE_URL=http://host.docker.internal:11434

  # Telegram bot — uncomment and set TELEGRAM_BOT_TOKEN to enable.
  # stuart-bot:
  #   build: .
  #   volumes:
  #     - stuart-data:/data/.claw-stu
  #   environment:
  #     - CLAW_STU_DATA_DIR=/data/.claw-stu
  #     - TELEGRAM_BOT_TOKEN=changeme
  #   command: ["clawstu", "bot"]
  #   depends_on:
  #     - stuart

volumes:
  stuart-data:
