<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask Stuart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 380px;
    min-height: 200px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: #1a1a1a;
    background: #fff;
    padding: 16px;
  }
  h1 {
    font-size: 16px;
    margin-bottom: 12px;
    color: #c0392b;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1 .icon { font-size: 20px; }
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
    margin-bottom: 10px;
  }
  textarea:focus {
    outline: none;
    border-color: #c0392b;
    box-shadow: 0 0 0 2px rgba(192,57,43,0.15);
  }
  button {
    width: 100%;
    padding: 10px;
    background: #c0392b;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #a93226; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  #response {
    margin-top: 12px;
    padding: 12px;
    background: #fdf2f0;
    border-radius: 6px;
    line-height: 1.5;
    display: none;
    white-space: pre-wrap;
  }
  #response.visible { display: block; }
  #error {
    margin-top: 8px;
    color: #c0392b;
    font-size: 12px;
    display: none;
  }
  #error.visible { display: block; }
  .footer {
    margin-top: 12px;
    font-size: 11px;
    color: #999;
    text-align: center;
  }
</style>
</head>
<body>
  <h1><span class="icon">&#127823;</span> Ask Stuart</h1>
  <textarea id="question" placeholder="Type your question or paste highlighted text..."></textarea>
  <button id="ask-btn">Ask Stuart</button>
  <div id="response"></div>
  <div id="error"></div>
  <div class="footer">Claw-STU &mdash; requires <code>clawstu serve</code></div>
  <script src="popup.js"></script>
</body>
</html>
